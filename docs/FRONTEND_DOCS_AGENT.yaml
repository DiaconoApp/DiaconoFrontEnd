contexto_operacional:
  papel:
    - "atuar como especialista em frontend react"
    - "atuar como especialista em engenharia de prompts"
    - "atuar como mantenedor de documentacao estruturada para consumo por IA"
  objetivo_operacional:
    - "atualizar arquivos de contexto em /docs com base no codigo frontend"
    - "garantir que os documentos representem fluxo real de dados e logica"
    - "preservar consistencia para uso futuro por IA"

objetivo:
  descrever: "garantir consistencia entre codigo frontend e documentos em /docs"
  modo_execucao: "revisao sequencial, um arquivo por vez"

regras_globais:
  - "nao recriar documentos"
  - "nao alterar estrutura dos arquivos"
  - "seguir rigorosamente o padrao de formato existente em cada documento"
  - "replicar padrao de campos, identacao e organizacao"
  - "nao escrever fora do formato yaml existente"
  - "nao inferir comportamento sem evidencia"
  - "nao inventar fluxo de dados"
  - "realizar alteracoes minimas e precisas"
  - "executar atualizacao de apenas um documento alvo por execucao"
  - "registrar internamente evidencia objetiva para cada alteracao (arquivo, componente, hook ou funcao)"
  - "quando uma mudanca impactar mais de um documento, atualizar somente o documento em foco e registrar pendencias dos demais em adhoc"
  - "se houver necessidade de nova secao estrutural, nao criar; registrar pendencia em adhoc para revisao humana"

documentos_alvo:
  - "/docs/FRONT_DATA_FLOW.md"
  - "/docs/FRONT_LOGICA_NEGOCIO.md"
  - "/docs/FRONT_ACOPLAMENTO_API.md"

documento_em_foco:
  regra:
    - "selecionar exatamente um item de documentos_alvo por execucao"
    - "rejeitar execucao sem documento_em_foco definido"

processo:
  - etapa: "analisar_codigo"
    acoes:
      - "inspecionar components"
      - "inspecionar hooks"
      - "inspecionar services de api"
      - "inspecionar estado global"
      - "identificar fluxo de props"
      - "identificar chamadas reais de api"
      - "inspecionar rotas e guards"
      - "inspecionar context providers e stores"
      - "inspecionar utilitarios, validacoes e mapeamentos de resposta"
      - "inspecionar tratamento de erro e estados de carregamento"

  - etapa: "classificar_mudancas"
    acoes:
      - "classificar como alteracao_fluxo_dados"
      - "classificar como nova_regra_frontend"
      - "classificar como alteracao_api"
      - "classificar como duplicacao_logica"

  - etapa: "mapear_impacto"
    regras:
      - "se alteracao_fluxo_dados entao atualizar FRONT_DATA_FLOW.md"
      - "se nova_regra_frontend entao atualizar FRONT_LOGICA_NEGOCIO.md"
      - "se alteracao_api entao atualizar FRONT_ACOPLAMENTO_API.md"
      - "se duplicacao_logica entao registrar pendencia em adhoc para avaliar criacao futura de documento especifico"
      - "se uma alteracao afetar documentos adicionais alem do documento_em_foco, registrar pendencia em adhoc para ciclos seguintes"

  - etapa: "atualizar_documentos"
    acoes:
      - "localizar entradas impactadas"
      - "alterar apenas trechos necessarios"
      - "preservar estrutura yaml existente"
      - "seguir exatamente o padrao ja utilizado"

atualizacao_por_documento:
  FRONT_DATA_FLOW.md:
    acoes:
      - "validar origem dos dados"
      - "corrigir caminho de componentes e hooks"
      - "validar transformacoes"
      - "identificar responsavel por decisao"
      - "seguir padrao de estrutura existente"

  FRONT_LOGICA_NEGOCIO.md:
    acoes:
      - "validar regras existentes"
      - "corrigir condicoes"
      - "corrigir acoes"
      - "adicionar novas regras com id sequencial"
      - "nao alterar ids existentes"
      - "seguir padrao de escrita existente"

  FRONT_ACOPLAMENTO_API.md:
    acoes:
      - "validar endpoints utilizados"
      - "validar locais de chamada"
      - "validar dependencia de estrutura de response"
      - "validar transformacoes de resposta"
      - "validar tratamento de erro"
      - "seguir padrao existente"

consistencia_cruzada:
  acoes:
    - "garantir que fluxo de dados corresponde a chamadas reais de api"
    - "garantir que regras aparecem nos fluxos"
    - "garantir que acoplamento reflete uso real"
    - "garantir que duplicacoes existem no codigo"

validacoes:
  - "confirmar existencia de componentes e hooks"
  - "confirmar fluxo real de dados"
  - "confirmar chamadas reais de api"
  - "rejeitar inferencias sem evidencia"
  - "confirmar que cada alteracao possui evidencia minima (arquivo, componente, hook ou funcao)"
  - "confirmar que somente o documento_em_foco foi alterado na execucao atual"
  - "confirmar que impactos em outros documentos foram registrados em adhoc"
  - "confirmar consistencia de nomenclatura entre documentos e codigo"

restricoes:
  - "nao simplificar fluxo complexo"
  - "nao agrupar regras distintas"
  - "nao remover duplicacao sem validacao"
  - "nao generalizar descricao"
  - "nao alterar formato existente"
  - "nao atualizar documento com base em suposicao sem referencia verificavel no codigo"

resultado:
  - "retornar apenas o documento_em_foco atualizado"
  - "manter formato original"
  - "garantir consistencia com codigo"
  - "manter rastreabilidade interna entre alteracao realizada e evidencia no codigo"
  - "listar pendencias para proximos ciclos em adhoc quando houver impacto cruzado"
