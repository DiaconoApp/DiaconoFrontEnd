server {
listen 80;
server_name _;

root /usr/share/nginx/html;
index index.html;

location / {
try_files $uri $uri/ /index.html;
}

location ~* \.(?:css|js|json|jpg|jpeg|gif|png|svg|ico|woff2?)$ {
expires 1M;
add_header Cache-Control "public";
try_files $uri =404;
}

error_page 500 502 503 504 /50x.html;
location = /50x.html {
root /usr/share/nginx/html;
}
}