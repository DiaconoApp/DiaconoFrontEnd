# 1. Redirecionar todo o tráfego HTTP (porta 80) para HTTPS
server {
    listen 80;
    server_name odiacono.duckdns.org www.odiacono.duckdns.org;
    
    # Redirecionamento 301 (permanente) para HTTPS
    return 301 https://$host$request_uri;
}

# 2. Configuração do servidor HTTPS (porta 443)
server {
    listen 443 ssl; # O parâmetro 'ssl' é crucial aqui
    server_name odiacono.duckdns.org www.odiacono.duckdns.org;

    # =========================================================
    # CONFIGURAÇÃO DOS CERTIFICADOS SSL
    # ATENÇÃO: Substitua pelos caminhos reais dos seus certificados
    # =========================================================
    ssl_certificate /etc/letsencrypt/live/odiacono.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/odiacono.duckdns.org/privkey.pem;
    
    # Boas práticas de segurança para SSL (Opcional, mas recomendado)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Suas configurações originais continuam abaixo:
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /api {
        return 301 /api/;
    }

    location /api/ {
        proxy_pass http://10.0.11.207:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme; # Agora isso passará 'https'
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90s;
    }

    location ~* \.(?:css|js|json|jpg|jpeg|gif|png|svg|ico|woff2?)$ {
        expires 1M;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}