<!DOCTYPE html>

    <style>

        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&display=swap');

        * {

<body class="bg-[#fdfdfd]">

        <div class="pt-[20px] w-[84%] ml-[16%]">

            <div class="mx-auto w-[96%] p-4 bg-[#DEE3E9] rounded">
                <div class="flex gap-2">
                    <div class="w-[50%]">

                        <input type="text" id="inp_nome" class="w-full py-[8px] px-2 mb-1.5 bg-[#f9f9f9] text-sm rounded

                        <div class="flex gap-2 w-full">
                            <div class="w-[50%]">

                            </div>
                            <div class="w-[50%]">

                        <label for="inp_confirmSenha" class="text-sm font-medium">Confirmar Senha</label>

                    </div>

            </div>
            <div class="flex mx-auto w-[96%] py-3">

                                </button>

                            <td class="text-xs font-semibold text-left p-2 border-b border-gray-200 text-gray-700" >Bruna Rocha Chaves</td>
                            <td class="text-xs font-semibold text-left p-2 border-b border-gray-200 text-gray-700" >bruna.chaves@hotmail.com.br</td>
                            <td class="text-xs font-semibold text-left p-2 border-b border-gray-200 text-gray-700" >12/08/2000</td>
                            <td class="text-xs font-semibold text-left p-2 border-b border-gray-200 text-gray-700">
                                <button  class="bg-[#DEE3E9] text-gray-700 border-none py-0.5 px-1 cursor-pointer rounded-md hover:bg-gray-300">
                                    <span class="material-symbols-outlined">edit</span>
                                </button>
                                <button  class="bg-[#ea4b4b] text-white border-none py-0.5 px-1 cursor-pointer rounded-md hover:bg-[#e53d3d]">
                                    <span class="material-symbols-outlined">delete</span>
                                </button>

                        </tr>
                    </tbody>

                </table>
            </div>

</html>
<script src="./script.js"></script>
<script>
  async function carregarTabela() {
    const membros = await pegarMembros();
    console.log(membros); // só para testar

    // Aqui você pode popular sua tabela com os dados
    const tbody = document.querySelector("tbody");
    tbody.innerHTML = "";

    membros.forEach(m => {
      tbody.innerHTML += `
        <tr class="border-b border-gray-200 even:bg-gray-150">
          <td class="text-xs font-semibold text-left p-2 border-b border-gray-200 text-gray-700" >${m.id}</td>
          <td class="text-xs font-semibold text-left p-2 border-b border-gray-200 text-gray-700" >${m.nome}</td>
          <td class="text-xs font-semibold text-left p-2 border-b border-gray-200 text-gray-700" >${m.email}</td>
          <td class="text-xs font-semibold text-left p-2 border-b border-gray-200 text-gray-700" >${m.dataNascimento}</td>
          <td class="text-xs font-semibold text-left p-2 border-b border-gray-200 text-gray-700">
                                <button class="bg-[#DEE3E9] text-gray-700 border-none py-0.5 px-1 cursor-pointer rounded-md hover:bg-gray-300">
                                    <span class="material-symbols-outlined">edit</span>
                                </button>
                                <button onclick="removerMembro(${m.id})"" class="bg-[#ea4b4b] text-white border-none py-0.5 px-1 cursor-pointer rounded-md hover:bg-[#e53d3d]">
                                    <span class="material-symbols-outlined">delete</span>
                                </button>   
                            </td>
        </tr>
      `;
    });
  }

  carregarTabela();
</script>
